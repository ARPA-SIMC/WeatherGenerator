name=SSP245 

[settings]
# scenarios input path 
input = "./scenarios/SSP245"

# output path
output = "./output"

# suffix of files
suffix = ".csv"

# value separator (default: comma)
separator = ","

# variables
var = "DAILY_TMIN,DAILY_TMAX,DAILY_PREC"

# climate period
climateYear1 = 1985
climateYear2 = 2014

# scenario period
scenarioYear1 = 2036
scenarioYear2 = 2065

# info position in the filename (start from zero)
varPosition = 0
seasonPosition = 1
modelPosition = 6

# data position in the csv file (start from zero)
codePosition = 0
lonPosition = 3
latPosition = 4
heightPosition = 5
changePosition = 6



